<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>감자마켓 트렌드 대시보드</title>
<style>
  :root {
    --primary: #FF6B2C;
    --primary-light: #FF8F5A;
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --sub: #6B7280;
    --border: #E5E7EB;
    --coupang: #E4393C;
    --naver: #03C75A;
    --insta: #C13584;
    --up: #EF4444;
    --down: #3B82F6;
    --new: #8B5CF6;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

  /* Header */
  header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    color: var(--primary);
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px;
  }
  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .date-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--sub);
    font-weight: 500;
  }
  .selected-count-badge {
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .selected-count-badge:hover { background: var(--primary-light); }

  /* Main Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Period Selector */
  .period-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .period-label { font-size: 13px; color: var(--sub); margin-right: 4px; font-weight: 500; }
  .period-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--sub);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .period-btn:hover { border-color: var(--primary); color: var(--primary); }
  .period-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 2px 8px rgba(255,107,44,0.3);
  }

  /* Platform Tabs */
  .platform-tabs {
    display: flex;
    gap: 0;
    background: white;
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    width: fit-content;
  }
  .platform-tab {
    padding: 10px 24px;
    border-radius: 9px;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--sub);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .platform-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .platform-tab[data-platform="all"] .dot { background: var(--primary); }
  .platform-tab[data-platform="coupang"] .dot { background: var(--coupang); }
  .platform-tab[data-platform="naver"] .dot { background: var(--naver); }
  .platform-tab[data-platform="instagram"] .dot { background: var(--insta); }
  .platform-tab.active { background: var(--bg); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* Dashboard Grid */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px) { .dashboard { grid-template-columns: 1fr; } }

  /* Summary Cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: white;
    border-radius: 12px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .summary-card .label { font-size: 12px; color: var(--sub); margin-bottom: 6px; font-weight: 500; }
  .summary-card .value { font-size: 24px; font-weight: 700; color: var(--text); }
  .summary-card .change { font-size: 12px; margin-top: 4px; }
  .change.up { color: var(--up); }
  .change.down { color: var(--down); }

  /* Trend Panel */
  .trend-panel {
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-platform-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    color: white;
  }
  .badge-coupang { background: var(--coupang); }
  .badge-naver { background: var(--naver); }
  .badge-instagram { background: var(--insta); }
  .badge-all { background: var(--primary); }

  /* Trend Items */
  .trend-list { padding: 8px 0; }
  .trend-item {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid #F3F4F6;
  }
  .trend-item:last-child { border-bottom: none; }
  .trend-item:hover { background: #F9FAFB; }
  .trend-item.selected { background: #FFF5F0; }

  .rank {
    width: 28px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--sub);
    flex-shrink: 0;
  }
  .rank.top3 { color: var(--primary); font-size: 16px; }

  .item-emoji {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-category {
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
  }

  .item-trend {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }
  .trend-change {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .trend-change.up { background: #FEE2E2; color: var(--up); }
  .trend-change.down { background: #DBEAFE; color: var(--down); }
  .trend-change.new { background: #EDE9FE; color: var(--new); }
  .trend-change.same { background: #F3F4F6; color: var(--sub); }

  .trend-score { font-size: 11px; color: var(--sub); }

  .select-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .select-btn:hover { border-color: var(--primary); background: #FFF5F0; }
  .select-btn.selected { background: var(--primary); border-color: var(--primary); color: white; }

  /* Mini chart sparkline */
  .sparkline {
    width: 60px;
    height: 28px;
    flex-shrink: 0;
  }

  /* Selected Products Drawer */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: -480px;
    width: 480px;
    height: 100vh;
    background: white;
    z-index: 201;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.12);
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer-title { font-size: 17px; font-weight: 700; }
  .drawer-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .drawer-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
  }
  .btn-primary {
    flex: 1;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-outline {
    padding: 12px 20px;
    background: white;
    color: var(--sub);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .selected-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .selected-item .item-emoji { width: 36px; height: 36px; font-size: 20px; }
  .selected-item .info { flex: 1; }
  .selected-item .name { font-size: 14px; font-weight: 600; }
  .selected-item .meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .remove-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    color: var(--sub);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .remove-btn:hover { background: #FEE2E2; color: var(--up); border-color: var(--up); }

  /* Note textarea in drawer */
  .note-area {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    resize: vertical;
    min-height: 70px;
    margin-top: 6px;
    font-family: inherit;
    color: var(--text);
  }
  .note-label { font-size: 12px; font-weight: 600; color: var(--sub); margin-top: 12px; display: block; }

  /* Category filter */
  .category-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .cat-btn {
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: white;
    font-size: 12px;
    color: var(--sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-btn:hover, .cat-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF5F0; }

  /* Section title */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Keyword cloud */
  .keyword-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 20px;
  }
  .keyword-tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .keyword-tag:hover { transform: scale(1.05); }
  .kw-size-1 { font-size: 11px; background: #F3F4F6; color: var(--sub); }
  .kw-size-2 { font-size: 13px; background: #FEF3C7; color: #92400E; }
  .kw-size-3 { font-size: 15px; background: #FCE7F3; color: #9D174D; }
  .kw-size-4 { font-size: 17px; background: #FFF5F0; color: var(--primary); font-weight: 700; }

  /* Refresh button */
  .refresh-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    font-size: 12px;
    color: var(--sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--sub);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Chart area */
  .chart-container {
    padding: 16px 20px;
  }
  .chart-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .chart-label { width: 80px; font-size: 12px; color: var(--sub); text-align: right; }
  .chart-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 20px; overflow: hidden; }
  .chart-bar { height: 100%; border-radius: 4px; transition: width 0.5s; display: flex; align-items: center; padding-left: 8px; }
  .chart-bar span { font-size: 11px; color: white; font-weight: 600; }
  .chart-bar.coupang { background: var(--coupang); }
  .chart-bar.naver { background: var(--naver); }
  .chart-bar.instagram { background: var(--insta); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🥔</div>
    감자마켓 트렌드 대시보드
  </div>
  <div class="header-right">
    <div class="date-badge" id="currentDate"></div>
    <div class="selected-count-badge" onclick="openDrawer()">
      📋 선별 목록 <span id="selectedCountBadge">0</span>개
    </div>
  </div>
</header>

<!-- Main -->
<div class="container">

  <!-- Period Selector -->
  <div class="period-bar">
    <span class="period-label">기간</span>
    <button class="period-btn active" onclick="setPeriod('daily', this)">일간</button>
    <button class="period-btn" onclick="setPeriod('weekly', this)">주간</button>
    <button class="period-btn" onclick="setPeriod('monthly', this)">월간</button>
    <button class="period-btn" onclick="setPeriod('yearly', this)">연간</button>
  </div>

  <!-- Summary Cards -->
  <div class="summary-row">
    <div class="summary-card">
      <div class="label">🔥 오늘 인기 키워드</div>
      <div class="value" id="summaryKeywords">127</div>
      <div class="change up" id="summaryKeywordsChange">▲ 전일 대비 +12%</div>
    </div>
    <div class="summary-card">
      <div class="label">📦 신규 트렌드 상품</div>
      <div class="value" id="summaryNew">34</div>
      <div class="change up" id="summaryNewChange">▲ +8개 신규</div>
    </div>
    <div class="summary-card">
      <div class="label">⬆️ 급상승 카테고리</div>
      <div class="value" id="summaryCategory">식품/건강</div>
      <div class="change up" id="summaryCategoryChange">▲ +28% 상승</div>
    </div>
    <div class="summary-card">
      <div class="label">✅ 내 선별 상품</div>
      <div class="value" id="summarySelected">0</div>
      <div class="change" id="summarySelectedChange" style="color: var(--sub)">오늘 선별한 상품</div>
    </div>
  </div>

  <!-- Platform Tabs -->
  <div class="platform-tabs">
    <button class="platform-tab active" data-platform="all" onclick="setPlatform('all', this)">
      <span class="dot"></span> 전체
    </button>
    <button class="platform-tab" data-platform="coupang" onclick="setPlatform('coupang', this)">
      <span class="dot"></span> 쿠팡
    </button>
    <button class="platform-tab" data-platform="naver" onclick="setPlatform('naver', this)">
      <span class="dot"></span> 네이버
    </button>
    <button class="platform-tab" data-platform="instagram" onclick="setPlatform('instagram', this)">
      <span class="dot"></span> 인스타그램
    </button>
  </div>

  <!-- Category Filter -->
  <div class="category-filter" id="categoryFilter">
    <button class="cat-btn active" onclick="setCategory('all', this)">전체</button>
    <button class="cat-btn" onclick="setCategory('food', this)">🍎 식품/건강</button>
    <button class="cat-btn" onclick="setCategory('beauty', this)">💄 뷰티/화장품</button>
    <button class="cat-btn" onclick="setCategory('fashion', this)">👗 패션/의류</button>
    <button class="cat-btn" onclick="setCategory('home', this)">🏠 홈/리빙</button>
    <button class="cat-btn" onclick="setCategory('kids', this)">🧸 유아동</button>
    <button class="cat-btn" onclick="setCategory('pet', this)">🐾 반려동물</button>
    <button class="cat-btn" onclick="setCategory('digital', this)">📱 디지털/가전</button>
  </div>

  <!-- Dashboard Grid -->
  <div class="dashboard" id="dashboard">
    <!-- Injected by JS -->
  </div>

</div>

<!-- Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">📋 오늘의 선별 상품</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <button class="btn-outline" onclick="clearSelected()">전체 해제</button>
    <button class="btn-primary" onclick="exportList()">📤 목록 내보내기</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const MOCK_DATA = {
  coupang: {
    daily: [
      { id:'c1', name:'제주 감귤 5kg', category:'식품/건강', cat:'food', emoji:'🍊', trend:'up', change:'+23%', score:'98점', note:'SNS 바이럴 급상승' },
      { id:'c2', name:'콜라겐 젤리 스틱', category:'식품/건강', cat:'food', emoji:'🍬', trend:'new', change:'NEW', score:'96점', note:'건강 간식 트렌드' },
      { id:'c3', name:'에어팟 프로 케이스', category:'디지털/가전', cat:'digital', emoji:'🎧', trend:'up', change:'+15%', score:'94점', note:'가성비 액세서리' },
      { id:'c4', name:'무형광 면 속옷 세트', category:'패션/의류', cat:'fashion', emoji:'👕', trend:'up', change:'+12%', score:'91점', note:'MZ 친환경 소비' },
      { id:'c5', name:'강아지 관절영양제', category:'반려동물', cat:'pet', emoji:'🐕', trend:'same', change:'=', score:'89점', note:'반려견 건강 관심↑' },
      { id:'c6', name:'스타벅스 텀블러', category:'홈/리빙', cat:'home', emoji:'☕', trend:'down', change:'-5%', score:'87점', note:'시즌 종료 영향' },
      { id:'c7', name:'키즈 우산 공룡', category:'유아동', cat:'kids', emoji:'🦕', trend:'up', change:'+31%', score:'85점', note:'장마철 수요 급증' },

// ===== STATE =====
let currentPeriod = 'daily';
let currentPlatform = 'all';
let currentCategory = 'all';
let selectedItems = {};

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  setDateBadge();
  render();
});

function setDateBadge() {
  const now = new Date();
  const options = { year:'numeric', month:'long', day:'numeric', weekday:'short' };
  document.getElementById('currentDate').textContent = now.toLocaleDateString('ko-KR', options);
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setPlatform(p, btn) {
  currentPlatform = p;
  document.querySelectorAll('.platform-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setCategory(c, btn) {
  currentCategory = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFilteredData(platform) {
  const raw = MOCK_DATA[platform][currentPeriod] || [];
  if (currentCategory === 'all') return raw;
  return raw.filter(i => i.cat === currentCategory);
}

// ===== RENDER =====
function render() {
  const dashboard = document.getElementById('dashboard');
  const platforms = currentPlatform === 'all' ? ['coupang','naver','instagram'] : [currentPlatform];

  let html = '';

  // Keywords panel
  html += `<div class="trend-panel" style="grid-column: span ${currentPlatform === 'all' ? '3' : '1'}; ${currentPlatform !== 'all' ? 'display:none;' : ''}">
    <div class="panel-header">
      <div class="panel-title">🔥 핫 키워드 (${periodLabel()})</div>
      <div style="font-size:12px; color:var(--sub)">클릭하여 상품 검색</div>
    </div>
    <div class="keyword-cloud">
      ${(KEYWORDS[currentPeriod]||[]).map(k => `<span class="keyword-tag kw-size-${k.size}" onclick="showToast('\"${k.text}\" 키워드로 검색합니다')">${k.text}</span>`).join('')}
    </div>
  </div>`;

  // Platform panels
  for (const p of platforms) {
    const data = getFilteredData(p);
    const platLabel = { coupang:'쿠팡', naver:'네이버 쇼핑', instagram:'인스타그램' }[p];
    const badgeClass = `badge-${p}`;

    html += `<div class="trend-panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="panel-platform-badge ${badgeClass}">${platLabel}</span>
          ${periodLabel()} 트렌드 TOP ${data.length}
        </div>
        <button class="refresh-btn" onclick="showToast('${platLabel} 데이터를 새로고침했습니다')">↻ 새로고침</button>
      </div>
      <div class="trend-list">`;

    if (data.length === 0) {
      html += `<div class="empty-state"><div class="icon">🔍</div><p>해당 카테고리의 트렌드가 없습니다</p></div>`;
    } else {
      data.forEach((item, idx) => {
        const rank = idx + 1;
        const isSelected = !!selectedItems[item.id];
        html += `
          <div class="trend-item ${isSelected ? 'selected' : ''}" data-id="${item.id}">
            <div class="rank ${rank <= 3 ? 'top3' : ''}">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : rank}</div>
            <div class="item-emoji">${item.emoji}</div>
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-category">${item.category} · ${item.note}</div>
            </div>
            <div class="item-trend">
              <span class="trend-change ${item.trend}">${item.change}</span>
              <span class="trend-score">${item.score}</span>
            </div>
            <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="toggleSelect('${item.id}', '${p}', ${JSON.stringify(item).replace(/'/g,"&#39;")})" title="${isSelected ? '선별 해제' : '상품 선별'}">
              ${isSelected ? '✓' : '+'}
            </button>
          </div>`;
      });
    }

    html += `</div></div>`;
  }

  // Platform trend bar (only in 'all' mode)
  if (currentPlatform === 'all') {
    html += `<div class="trend-panel" style="grid-column: span 3">
      <div class="panel-header">
        <div class="panel-title">📊 플랫폼별 트렌드 강도 (${periodLabel()})</div>
      </div>
      <div class="chart-container">
        <div class="chart-bar-row">
          <div class="chart-label">쿠팡</div>
          <div class="chart-bar-wrap"><div class="chart-bar coupang" style="width:85%"><span>85</span></div></div>
        </div>
        <div class="chart-bar-row">
          <div class="chart-label">네이버</div>
          <div class="chart-bar-wrap"><div class="chart-bar naver" style="width:92%"><span>92</span></div></div>
        </div>
        <div class="chart-bar-row">
          <div class="chart-label">인스타그램</div>
          <div class="chart-bar-wrap"><div class="chart-bar instagram" style="width:78%"><span>78</span></div></div>
        </div>
      </div>
    </div>`;
  }

  dashboard.innerHTML = html;
  updateSummary();
}

function periodLabel() {
  return { daily:'일간', weekly:'주간', monthly:'월간', yearly:'연간' }[currentPeriod];
}

function toggleSelect(id, platform, item) {
  if (selectedItems[id]) {
    delete selectedItems[id];
    showToast(`"${item.name}" 선별 해제`);
  } else {
    selectedItems[id] = { ...item, platform };
    showToast(`"${item.name}" 선별 목록에 추가됨 ✓`);
  }
  updateBadge();
  render();
  if (document.getElementById('drawer').classList.contains('open')) {
    renderDrawer();
  }
}

function updateBadge() {
  const count = Object.keys(selectedItems).length;
  document.getElementById('selectedCountBadge').textContent = count;
  document.getElementById('summarySelected').textContent = count;
}

function updateSummary() {
  const summaryData = {
    daily: { keywords:'127', keyChange:'▲ 전일 대비 +12%', newItems:'34', newChange:'▲ +8개 신규', cat:'식품/건강', catChange:'▲ +28% 상승' },
    weekly: { keywords:'489', keyChange:'▲ 전주 대비 +8%', newItems:'112', newChange:'▲ +23개 신규', cat:'패션/의류', catChange:'▲ +41% 상승' },
    monthly: { keywords:'1,823', keyChange:'▲ 전월 대비 +19%', newItems:'378', newChange:'▲ +67개 신규', cat:'홈/리빙', catChange:'▲ +55% 상승' },
    yearly: { keywords:'18,430', keyChange:'▲ 전년 대비 +32%', newItems:'2,140', newChange:'▲ +890개 신규', cat:'식품/건강', catChange:'▲ +78% 상승' },
  };
  const d = summaryData[currentPeriod];
  document.getElementById('summaryKeywords').textContent = d.keywords;
  document.getElementById('summaryKeywordsChange').textContent = d.keyChange;
  document.getElementById('summaryNew').textContent = d.newItems;
  document.getElementById('summaryNewChange').textContent = d.newChange;
  document.getElementById('summaryCategory').textContent = d.cat;
  document.getElementById('summaryCategoryChange').textContent = d.catChange;
}

// ===== DRAWER =====
function openDrawer() {
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function renderDrawer() {
  const body = document.getElementById('drawerBody');
  const items = Object.values(selectedItems);
  if (items.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>아직 선별한 상품이 없습니다<br>트렌드 목록에서 + 버튼을 눌러<br>상품을 선별해보세요</p></div>`;
    return;
  }
  const platLabels = { coupang:'쿠팡', naver:'네이버', instagram:'인스타그램' };
  let html = `<div class="section-title">선별 상품 (${items.length}개)</div>`;
  html += items.map(item => `
    <div class="selected-item">
      <div class="item-emoji">${item.emoji}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="meta">${platLabels[item.platform]} · ${item.category} · ${item.change}</div>
      </div>
      <button class="remove-btn" onclick="toggleSelect('${item.id}', '${item.platform}', ${JSON.stringify(item).replace(/'/g,"&#39;")})">✕</button>
    </div>`).join('');
  html += `<span class="note-label">📝 오늘의 메모</span>`;
  html += `<textarea class="note-area" id="selectionNote" placeholder="선별 이유, 발주 수량, 특이사항 등을 메모하세요...">${window._savedNote||''}</textarea>`;
  body.innerHTML = html;
}

function clearSelected() {
  selectedItems = {};
  updateBadge();
  render();
  renderDrawer();
  showToast('선별 목록을 초기화했습니다');
}

function exportList() {
  const items = Object.values(selectedItems);
  const note = document.getElementById('selectionNote')?.value || '';
  window._savedNote = note;
  if (items.length === 0) { showToast('선별된 상품이 없습니다'); return; }

  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR');
  const platLabels = { coupang:'쿠팡', naver:'네이버', instagram:'인스타그램' };

  let text = `📋 감자마켓 상품 선별 목록\n`;
  text += `📅 ${dateStr} | 기간: ${periodLabel()}\n`;
  text += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
  items.forEach((item, i) => {
    text += `${i+1}. ${item.name}\n   플랫폼: ${platLabels[item.platform]} | 카테고리: ${item.category}\n   트렌드: ${item.change} | 점수: ${item.score}\n   비고: ${item.note}\n\n`;
  });
  if (note) { text += `━━━━━━━━━━━━━━━━━━━━━\n📝 메모:\n${note}\n`; }

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `감자마켓_선별목록_${now.toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('선별 목록을 내보냈습니다 📤');
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}
